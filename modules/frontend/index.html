<!DOCTYPE html>
<html>

<head>

<title>Employee Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Employee Portal</h2>

<input id="name" class="form-control mb-2" placeholder="Employee Name">

<input id="dept" class="form-control mb-2" placeholder="Department">

<input id="salary" class="form-control mb-2" placeholder="Salary">

<button class="btn btn-primary" onclick="saveEmployee()">
Add Employee
</button>

<hr>

<h3>Employees</h3>

<table class="table">

<tbody id="employees"></tbody>

</table>

<script>

const backend =
"http://10.10.21.2:8080";

function loadEmployees(){

fetch(
backend + "/employees"
)
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(emp=>{

html += `
<tr>
<td>${emp[1]}</td>
<td>${emp[2]}</td>
<td>${emp[3]}</td>
</tr>
`;

});

document.getElementById(
"employees"
).innerHTML = html;

});

}

function saveEmployee(){

fetch(
backend + "/employee",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:document.getElementById("name").value,
department:document.getElementById("dept").value,
salary:document.getElementById("salary").value
})
}
)
.then(()=>{
loadEmployees();
});

}

loadEmployees();

</script>

</body>
</html>
